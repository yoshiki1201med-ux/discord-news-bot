name: send-news

on:
  push:
    paths:
      - "news/**/*.md"
  workflow_dispatch:
    inputs:
      markdown_file:
        description: "news/2026-03-16.md"
        required: true
        default: ""

jobs:
  send-to-discord:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: find-file
        id: find_file
        run: |
          if [ -n "${{ github.event.inputs.markdown_file }}" ]; then
            FILE="${{ github.event.inputs.markdown_file }}"
          else
            FILE=$(git diff --name-only HEAD~1 HEAD -- 'news/**/*.md' | head -1)
          fi
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "file not found"
            exit 1
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
      - name: send-to-discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scripts/send_to_discord.py "${{ steps.find_file.outputs.file }}"
