name: send-news

on:
  push:
    paths:
      - "news/**/*.md"
  workflow_dispatch:
    inputs:
      mode:
        description: "generate or send"
        required: true
        default: "generate"
      markdown_file:
        description: "file path for send mode"
        required: false
        default: ""
  schedule:
    - cron: "0 21 * * 0-4"

jobs:
  generate-and-send:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'generate')
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install-deps
        run: pip install yfinance
      - name: generate-and-send
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/generate_and_send.py

  send-existing:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'send')
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: find-file
        id: find_file
        run: |
          if [ -n "${{ github.event.inputs.markdown_file }}" ]; then
            FILE="${{ github.event.inputs.markdown_file }}"
          else
            FILE=$(git diff --name-only HEAD~1 HEAD -- 'news/**/*.md' | head -1)
          fi
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "file not found"
            exit 1
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
      - name: send-to-discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/send_to_discord.py "${{ steps.find_file.outputs.file }}"
